<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Code Agent Traffic Light Prototype</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #111827;
        --muted: #5f6b7a;
        --panel: rgba(255, 255, 255, 0.1);
        --panel-strong: rgba(255, 255, 255, 0.22);
        --line: rgba(255, 255, 255, 0.38);
        --shadow: rgba(15, 23, 42, 0.08);
        --red: #ef4444;
        --yellow: #eab308;
        --autopilot-blue: #00a9ff;
        --autopilot-cyan: #40f2ff;
        --autopilot-deep: #0070e8;
        --green: #22c55e;
        --idle: #94a3b8;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        min-height: 100%;
        margin: 0;
        background: transparent;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        display: grid;
        min-height: 100vh;
        place-items: center;
        color: var(--ink);
      }

      .stage {
        display: grid;
        width: min(720px, calc(100vw - 32px));
        min-height: 460px;
        place-items: center;
        border-radius: 28px;
        background: transparent;
      }

      .desktop-split {
        display: grid;
        width: min(560px, calc(100vw - 48px));
        gap: 24px;
      }

      .preview-row {
        display: flex;
        min-height: 118px;
        align-items: center;
        justify-content: center;
        border-radius: 24px;
      }

      .preview-row.light {
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.78), rgba(241, 245, 249, 0.5)),
          repeating-linear-gradient(135deg, rgba(148, 163, 184, 0.13) 0 1px, transparent 1px 18px);
      }

      .preview-row.dark {
        background:
          linear-gradient(135deg, rgba(24, 32, 44, 0.86), rgba(51, 65, 85, 0.72)),
          repeating-linear-gradient(135deg, rgba(255, 255, 255, 0.07) 0 1px, transparent 1px 18px);
      }

      .agent-widget {
        position: relative;
        display: flex;
        width: 292px;
        height: 68px;
        align-items: center;
        gap: 9px;
        padding: 9px 10px 9px 11px;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 24px;
        background:
          radial-gradient(circle at 18% 0%, rgba(255, 255, 255, 0.22), transparent 34%),
          linear-gradient(145deg, var(--panel-strong), var(--panel) 52%, rgba(255, 255, 255, 0.06)),
          rgba(255, 255, 255, 0.08);
        box-shadow:
          0 14px 32px var(--shadow),
          0 0 0 0.5px rgba(15, 23, 42, 0.06),
          inset 0 1px 0 rgba(255, 255, 255, 0.42),
          inset 0 -1px 0 rgba(255, 255, 255, 0.1),
          inset 0 0 0 0.5px rgba(255, 255, 255, 0.18);
        -webkit-app-region: drag;
        backdrop-filter: blur(34px) saturate(1.8);
      }

      .agent-widget.single {
        width: 202px;
      }

      .agent-widget.double {
        width: 292px;
      }

      .agent-widget::before {
        position: absolute;
        inset: 0;
        border-radius: inherit;
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.13), transparent 24% 76%, rgba(255, 255, 255, 0.08)),
          repeating-linear-gradient(115deg, rgba(255, 255, 255, 0.055) 0 1px, transparent 1px 5px);
        content: "";
        opacity: 0.34;
        pointer-events: none;
      }

      .agents {
        position: relative;
        z-index: 1;
        display: grid;
        min-width: 0;
        flex: 1;
        gap: 7px;
      }

      .single .agents {
        grid-template-columns: minmax(0, 1fr);
      }

      .double .agents {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .agent {
        display: flex;
        min-width: 0;
        align-items: center;
        gap: 8px;
        padding: 6px 8px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 17px;
        background: rgba(255, 255, 255, 0.055);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.18),
          inset 0 -1px 0 rgba(15, 23, 42, 0.035);
      }

      .agent.working {
        border-color: rgba(64, 242, 255, 0.3);
        background:
          linear-gradient(100deg, rgba(0, 169, 255, 0.13), rgba(255, 255, 255, 0.055) 54%),
          rgba(255, 255, 255, 0.055);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.22),
          inset 0 -1px 0 rgba(0, 112, 232, 0.08),
          0 0 18px rgba(0, 169, 255, 0.09);
      }

      .dot {
        position: relative;
        width: 18px;
        height: 18px;
        flex: 0 0 auto;
        border-radius: 999px;
        background: var(--idle);
        box-shadow:
          inset 0 -3px 5px rgba(15, 23, 42, 0.26),
          inset 0 2px 3px rgba(255, 255, 255, 0.72),
          0 0 0 4px rgba(148, 163, 184, 0.14);
      }

      .dot.working {
        background:
          radial-gradient(circle at 50% 34%, rgba(255, 255, 255, 0.96) 0 12%, transparent 13%),
          radial-gradient(circle at 50% 50%, var(--autopilot-cyan) 0 28%, var(--autopilot-blue) 52%, var(--autopilot-deep) 100%);
        box-shadow:
          inset 0 -4px 6px rgba(3, 45, 116, 0.34),
          inset 0 2px 4px rgba(255, 255, 255, 0.76),
          0 0 0 4px rgba(0, 169, 255, 0.15),
          0 0 16px rgba(0, 169, 255, 0.76),
          0 0 34px rgba(64, 242, 255, 0.42);
        animation: autopilot-breathe 2.2s ease-in-out infinite;
      }

      .dot.working::before {
        position: absolute;
        inset: 7px 3px;
        border-radius: 999px;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.96), transparent);
        box-shadow: 0 0 9px rgba(255, 255, 255, 0.8);
        content: "";
        opacity: 0.92;
      }

      .dot.working::after {
        position: absolute;
        inset: -7px;
        border: 1px solid rgba(64, 242, 255, 0.5);
        border-radius: inherit;
        animation: autopilot-pulse 2.2s ease-out infinite;
        content: "";
      }

      .dot.waiting {
        background: var(--red);
        box-shadow:
          inset 0 -4px 6px rgba(127, 29, 29, 0.32),
          inset 0 2px 4px rgba(255, 255, 255, 0.68),
          0 0 0 4px rgba(239, 68, 68, 0.13),
          0 0 18px rgba(239, 68, 68, 0.48);
      }

      .dot.done {
        background: var(--green);
        box-shadow:
          inset 0 -4px 6px rgba(20, 83, 45, 0.28),
          inset 0 2px 4px rgba(255, 255, 255, 0.7),
          0 0 0 4px rgba(34, 197, 94, 0.14),
          0 0 18px rgba(34, 197, 94, 0.46);
      }

      .dot.waiting::after {
        position: absolute;
        inset: -7px;
        border: 1px solid rgba(239, 68, 68, 0.46);
        border-radius: inherit;
        animation: pulse 1.6s ease-out infinite;
        content: "";
      }

      .copy {
        min-width: 0;
      }

      .name {
        overflow: hidden;
        color: var(--ink);
        font-size: 12px;
        font-weight: 700;
        line-height: 1.15;
        text-shadow: 0 1px 8px rgba(255, 255, 255, 0.54);
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .status {
        overflow: hidden;
        color: var(--muted);
        font-size: 10.5px;
        font-weight: 600;
        line-height: 1.2;
        text-shadow: 0 1px 8px rgba(255, 255, 255, 0.42);
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .status.working {
        color: #0070e8;
        text-shadow:
          0 1px 8px rgba(255, 255, 255, 0.58),
          0 0 12px rgba(64, 242, 255, 0.36);
      }

      .controls {
        position: relative;
        z-index: 1;
        display: flex;
        width: 76px;
        flex: 0 0 auto;
        align-items: center;
        gap: 4px;
        opacity: 0;
        pointer-events: none;
        transform: translateX(8px);
        transition:
          width 180ms ease,
          opacity 160ms ease,
          transform 180ms ease;
        -webkit-app-region: no-drag;
      }

      .agent-widget:hover .controls,
      .agent-widget:focus-within .controls {
        opacity: 1;
        pointer-events: auto;
        transform: translateX(0);
      }

      .icon-button {
        display: grid;
        width: 22px;
        height: 22px;
        flex: 0 0 auto;
        place-items: center;
        border: 0;
        border-radius: 999px;
        color: #334155;
        background: rgba(255, 255, 255, 0.16);
        cursor: pointer;
        transition:
          background 160ms ease,
          color 160ms ease,
          box-shadow 160ms ease;
      }

      .icon-button:hover,
      .icon-button:focus-visible {
        color: #0f172a;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.14);
        outline: 0;
      }

      .icon-button.close:hover,
      .icon-button.close:focus-visible {
        color: #991b1b;
        background: rgba(254, 226, 226, 0.92);
        box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.12);
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        border: 0;
        margin: -1px;
        white-space: nowrap;
      }

      @keyframes pulse {
        from {
          opacity: 0.76;
          transform: scale(0.82);
        }

        to {
          opacity: 0;
          transform: scale(1.35);
        }
      }

      @keyframes autopilot-breathe {
        0%,
        100% {
          filter: saturate(1.08) brightness(1);
          transform: scale(1);
        }

        50% {
          filter: saturate(1.35) brightness(1.14);
          transform: scale(1.04);
        }
      }

      @keyframes autopilot-pulse {
        from {
          opacity: 0.72;
          transform: scale(0.78);
        }

        to {
          opacity: 0;
          transform: scale(1.58);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 1ms !important;
          animation-iteration-count: 1 !important;
          scroll-behavior: auto !important;
          transition-duration: 1ms !important;
        }
      }

      @media (max-width: 420px) {
        .stage {
          width: 100vw;
          min-height: 100vh;
          border-radius: 0;
        }

        .desktop-split {
          width: calc(100vw - 24px);
        }

        .agent-widget.double {
          width: 286px;
        }
      }
    </style>
  </head>
  <body>
    <main class="stage" aria-label="透明菜单栏小组件原型">
      <div class="desktop-split">
        <section class="preview-row light" aria-label="浅色桌面背景预览">
          <div class="agent-widget double" role="group" aria-label="Code Agent Traffic Light">
            <div class="agents">
              <article class="agent working" aria-label="Codex 工作中">
                <span class="dot working" aria-hidden="true"></span>
                <div class="copy">
                  <div class="name">Codex</div>
                  <div class="status working">工作中</div>
                </div>
              </article>
              <article class="agent" aria-label="Claude 等你回复">
                <span class="dot waiting" aria-hidden="true"></span>
                <div class="copy">
                  <div class="name">Claude</div>
                  <div class="status">等你回复</div>
                </div>
              </article>
            </div>
            <div class="controls" aria-label="窗口控制">
              <button class="icon-button" type="button" aria-label="静音">
                <svg width="13" height="13" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M11 5 6 9H3v6h3l5 4V5Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                  <path d="M16 9a5 5 0 0 1 0 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                </svg>
              </button>
              <button class="icon-button" type="button" aria-label="隐藏">
                <svg width="13" height="13" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M5 12h14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                </svg>
              </button>
              <button class="icon-button close" type="button" aria-label="关闭">
                <svg width="13" height="13" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="m6 6 12 12M18 6 6 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                </svg>
              </button>
            </div>
          </div>
        </section>

        <section class="preview-row dark" aria-label="深色桌面背景预览">
          <div class="agent-widget single" role="group" aria-label="Code Agent Traffic Light">
            <div class="agents">
              <article class="agent" aria-label="Codex 待验收">
                <span class="dot done" aria-hidden="true"></span>
                <div class="copy">
                  <div class="name">Codex</div>
                  <div class="status">待验收</div>
                </div>
              </article>
            </div>
            <div class="controls" aria-label="窗口控制">
              <button class="icon-button" type="button" aria-label="静音">
                <svg width="13" height="13" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M11 5 6 9H3v6h3l5 4V5Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                  <path d="M16 9a5 5 0 0 1 0 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                </svg>
              </button>
              <button class="icon-button" type="button" aria-label="隐藏">
                <svg width="13" height="13" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M5 12h14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                </svg>
              </button>
              <button class="icon-button close" type="button" aria-label="关闭">
                <svg width="13" height="13" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="m6 6 12 12M18 6 6 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                </svg>
              </button>
            </div>
          </div>
        </section>

        <section class="preview-row light" aria-label="未连接单 Agent 宽度预览">
          <div class="agent-widget single" role="group" aria-label="Code Agent Traffic Light">
            <div class="agents">
              <article class="agent" aria-label="未连接">
                <span class="dot" aria-hidden="true"></span>
                <div class="copy">
                  <div class="name">未连接</div>
                  <div class="status">未连接</div>
                </div>
              </article>
            </div>
            <div class="controls" aria-label="窗口控制">
              <button class="icon-button" type="button" aria-label="静音">
                <svg width="13" height="13" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M11 5 6 9H3v6h3l5 4V5Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                  <path d="M16 9a5 5 0 0 1 0 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                </svg>
              </button>
              <button class="icon-button" type="button" aria-label="隐藏">
                <svg width="13" height="13" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M5 12h14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                </svg>
              </button>
              <button class="icon-button close" type="button" aria-label="关闭">
                <svg width="13" height="13" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="m6 6 12 12M18 6 6 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                </svg>
              </button>
            </div>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
